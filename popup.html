<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        .config-section {
            margin-bottom: 15px;
        }
        .config-item {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input[type="text"] {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            margin-top: 10px;
            color: #4CAF50;
            font-size: 14px;
            text-align: center;
        }
        .match-conditions {
            margin-bottom: 10px;
        }
        .match-condition {
            position: relative;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        .match-condition input {
            margin-bottom: 0;
            padding-right: 30px;
        }
        .remove-condition {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-condition:hover {
            background: #cc0000;
        }
        .add-condition {
            background-color: #2196F3;
            margin-bottom: 15px;
        }
        .add-condition:hover {
            background-color: #1976D2;
        }
        .domain-selector {
            margin-bottom: 15px;
        }
        .domain-selector select {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .domain-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .domain-actions button {
            flex: 1;
        }
        .delete-domain {
            background-color: #ff4444;
        }
        .delete-domain:hover {
            background-color: #cc0000;
        }
        .copy-domain {
            background-color: #2196F3;
        }
        .copy-domain:hover {
            background-color: #1976D2;
        }
        .top-buttons {
            margin-bottom: 15px;
        }
        .top-buttons button {
            margin-bottom: 10px;
        }
        .top-buttons button:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <h1>图片高亮插件配置</h1>
    
    <div class="top-buttons">
        <button class="add-condition" id="addCondition">添加匹配条件</button>
    </div>
    
    <div class="config-section">
        <div class="domain-selector">
            <label for="domainSelect">选择网站：</label>
            <select id="domainSelect">
                <!-- 域名选项将在这里动态添加 -->
            </select>
            <div class="domain-actions">
                <button class="copy-domain" id="copyDomain">复制配置</button>
                <button class="delete-domain" id="deleteDomain">删除配置</button>
            </div>
        </div>
        <div class="config-item">
            <label>匹配条件：</label>
            <div id="matchConditions" class="match-conditions">
                <!-- 匹配条件将在这里动态添加 -->
            </div>
        </div>
        <div class="config-item">
            <label for="borderColor">边框颜色：</label>
            <input type="text" id="borderColor" placeholder="例如：#ff69b4">
        </div>
    </div>
    
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
